name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install snappy (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsnappy-dev

      - name: Install snappy (macOS)
        if: runner.os == 'macOS'
        run: brew install snappy

      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[release]"

      - name: Build PyInstaller bundles
        shell: bash
        run: |
          mkdir -p dist-bin
          for entry in gbm-convert gbm-build gbm-inspect gbm-diff gbm-test gbm-index-parse; do
            pyinstaller --onefile --name "$entry" \
              --collect-all gbm_tools \
              --distpath dist-bin \
              -c <(echo "from gbm_tools.cli import ${entry//-/_}; ${entry//-/_}()")
          done

      - uses: actions/upload-artifact@v4
        with:
          name: gbm-tools-${{ runner.os }}
          path: dist-bin/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
